## Render Blueprint — deploys backend + frontend + PostgreSQL in one click
## Docs: https://render.com/docs/blueprint-spec

services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: sales-copilot-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales-copilot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # ── Secrets: fill these in Render dashboard after first deploy ──────────
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false          # set to your frontend Render URL after it deploys
      # ── Optional integrations ───────────────────────────────────────────────
      - key: REDIS_URL
        sync: false          # leave blank (cache degrades gracefully) or use Upstash
      - key: HUBSPOT_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: sales-copilot
      - key: PINECONE_NAMESPACE
        value: prod

  # ── Frontend (React/Vite static site) ───────────────────────────────────────
  - type: web
    name: sales-copilot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback — lets react-router handle all paths
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend Render URL, e.g. https://sales-copilot-backend.onrender.com

# ── PostgreSQL ───────────────────────────────────────────────────────────────
databases:
  - name: sales-copilot-db
    plan: free
    region: oregon
    databaseName: salescopilot
    user: sc
